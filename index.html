<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sid</title>

<!-- =================================================================
     EDIT EVERYTHING HERE
     - handle / host / tagline / links / footer: your basic info.
     - links[]: copy a { ... } block to add a link, delete one to remove.
     - playlist[]: copy a { ... } block to add a song (see MUSIC below).
     - video: set your background YouTube clip (see VIDEO below).
     ================================================================= -->
<script>
  const CONFIG = {
    handle: "sid",
    host: "arch",              // shown as sid@arch in the prompt
    tagline: "building something. soon.",

    links: [
      { symbol: ">",  label: "github",    url: "https://github.com/" },
      { symbol: "~/", label: "telegram",  url: "https://t.me/MongolianSextorter166" },
      { symbol: "$",  label: "discord",   url: "#" },
      { symbol: ">",  label: "projects",  url: "#" },
    ],

    footer: "(c) 2026 sid",

    // Tab-title spinner frames (cycled left of your handle).
    spinnerFrames: ["[-]", "[\\]", "[|]", "[/]"],
    spinnerSpeed: 130,   // ms per frame

    // ---- MUSIC ----------------------------------------------------
    // Songs play top-to-bottom, then loop back to the first.
    // To add a song: drop the .mp3 next to this file, then copy a line
    // below and change title / artist / src to match the filename.
    playlist: [
      { title: "Marginalia #65", artist: "Masakatsu Takagi", src: "marginalia-65-masakatsu-takagi.mp3" },
      // { title: "Another Track", artist: "Someone", src: "another-track.mp3" },
    ],
    autoplay: true,     // try to start on load (browsers may require 1 click)
    startVolume: 0.6,   // 0.0 - 1.0

    // ---- VIDEO ----------------------------------------------------
    // Background YouTube clip: muted + looping. Paste just the video ID
    // (the part after "watch?v=" in the URL).
    video: {
      enabled: true,
      youtubeId: "IUfA_J4eES0",  // full 11-char id
      grayscale: true,           // keep it monochrome/on-theme (false = color)
    },
  };
</script>

<style>
  :root {
    --bg: #000000;
    --text: #e6e6e6;
    --muted: #7a7a7a;
    --glass-fill: rgba(255, 255, 255, 0.035);
    --glow: rgba(255, 255, 255, 0.06);
    --mono: "JetBrains Mono", "SF Mono", "Menlo", "Consolas",
            ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* ---- Background video + darkening overlay ---- */
  .bg-video { position: fixed; inset: 0; z-index: -3; overflow: hidden; pointer-events: none; }
  .bg-video iframe {
    position: absolute; top: 50%; left: 50%;
    width: 100vw; height: 56.25vw;            /* 16:9 by width  */
    min-width: 177.78vh; min-height: 100vh;   /* 16:9 by height */
    transform: translate(-50%, -50%);
    border: 0;
  }
  .bg-video.gray iframe { filter: grayscale(1) contrast(1.05) brightness(0.65); }
  .bg-overlay { position: fixed; inset: 0; z-index: -2; background: rgba(0,0,0,0.55); pointer-events: none; }

  /* Faint drifting glow */
  .glow {
    position: fixed; width: 60vmax; height: 60vmax;
    left: 50%; top: 40%; transform: translate(-50%, -50%);
    background: radial-gradient(circle at center, var(--glow) 0%, rgba(255,255,255,0) 60%);
    filter: blur(40px); pointer-events: none; z-index: -1;
    animation: drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(-55%, -55%) scale(1); }
    100% { transform: translate(-45%, -42%) scale(1.15); }
  }

  main {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
    display: flex; flex-direction: column; align-items: center;
    gap: 22px;
  }

  /* ---- Prompt / handle ---- */
  .prompt { font-size: 15px; letter-spacing: 0.3px; display: flex; align-items: center; gap: 2px; min-height: 20px; }
  .prompt .dim { color: var(--muted); }
  .prompt .path { color: var(--text); }
  .cursor {
    display: inline-block; width: 8px; height: 17px; margin-left: 3px;
    background: var(--text); animation: blink 1.1s steps(1) infinite; transform: translateY(2px);
  }
  @keyframes blink { 50% { opacity: 0; } }

  .tagline { font-size: 12.5px; color: var(--muted); text-align: center; letter-spacing: 0.2px; min-height: 16px; }

  /* ---- Stack that holds link tiles AND the player ---- */
  .links { width: 100%; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }

  /* Shared tile look (links + player both use .tile) */
  .tile {
    position: relative;
    display: flex; align-items: center; gap: 12px;
    padding: 15px 18px;
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    background: transparent;
    overflow: hidden;
    isolation: isolate;
    transition: color 0.25s ease;
  }
  /* frosted light that follows the cursor */
  .tile::before {
    content: "";
    position: absolute; inset: 0; border-radius: inherit;
    background: radial-gradient(160px circle at var(--mx, 50%) var(--my, 50%),
                rgba(255,255,255,0.13), rgba(255,255,255,0.04) 35%, transparent 70%);
    opacity: 0; transition: opacity 0.3s ease; z-index: -1;
    pointer-events: none; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .tile:hover::before, .tile:focus-visible::before, .tile.active::before { opacity: 1; }
  .tile:focus-visible { outline: none; }
  .tile .sym { color: var(--muted); font-size: 14px; min-width: 20px; transition: color 0.25s ease; }
  .tile .label { font-size: 14px; letter-spacing: 0.3px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile .arrow { color: var(--muted); font-size: 13px; opacity: 0; transform: translateX(-4px); transition: opacity 0.25s ease, transform 0.25s ease; }
  .tile:hover, .tile:focus-visible { color: #ffffff; }
  .tile:hover .sym, .tile:focus-visible .sym { color: var(--text); }
  .tile:hover .arrow, .tile:focus-visible .arrow { opacity: 1; transform: translateX(0); }

  /* ---- Player: same tile, with terminal-glyph controls ---- */
  .player { padding-bottom: 20px; }         /* room for the seek line */
  .player .label .partist { color: var(--muted); }
  .pctrls { display: flex; align-items: center; gap: 12px; }
  .pbtn {
    background: none; border: 0; cursor: pointer;
    color: var(--muted); font-family: var(--mono);
    font-size: 13px; line-height: 1; padding: 0;
    letter-spacing: 0.5px; transition: color 0.2s ease;
  }
  .pbtn:hover { color: var(--text); }
  .pbtn.play { color: var(--text); }        /* play/pause slightly brighter */
  /* thin seek line pinned to the bottom edge of the tile */
  .pbar-track {
    position: absolute; left: 18px; right: 18px; bottom: 9px;
    height: 2px; border-radius: 2px;
    background: rgba(255,255,255,0.12); cursor: pointer;
  }
  .pbar { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: var(--text); border-radius: 2px; }

  footer { margin-top: 10px; font-size: 11px; color: var(--muted); letter-spacing: 0.4px; }

  @media (prefers-reduced-motion: reduce) {
    .glow, .cursor { animation: none; }
    .tile, .tile::before, .tile .arrow { transition: none; }
  }
</style>
</head>
<body>
  <!-- background layers -->
  <div class="bg-video" id="bgVideo"></div>
  <div class="bg-overlay"></div>
  <div class="glow"></div>

  <main>
    <div class="prompt" id="prompt"></div>
    <div class="tagline" id="tagline"></div>

    <nav class="links" id="links">
      <!-- link tiles injected here, then the player tile appended below -->

      <!-- MUSIC PLAYER: styled exactly like a link tile -->
      <div class="tile player" id="player" style="display:none">
        <span class="sym">&#9834;</span>            <!-- musical note glyph -->
        <span class="label" id="ptitle"></span>
        <span class="pctrls">
          <button class="pbtn"      id="prev"       title="previous">|&lt;</button>
          <button class="pbtn play" id="playpause"  title="play / pause">[&#9654;]</button>
          <button class="pbtn"      id="next"       title="next">&gt;|</button>
        </span>
        <div class="pbar-track" id="pprogress"><div class="pbar" id="pbar"></div></div>
      </div>
    </nav>

    <footer id="footer"></footer>
  </main>

  <audio id="audio" preload="auto"></audio>

<script>
  (function () {
    const c = CONFIG;
    const $ = (id) => document.getElementById(id);
    const reduceMotion =
      window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    // ---------- Terminal prompt ----------
    $("prompt").innerHTML =
      '<span class="path">' + c.handle + "@" + c.host + '</span>' +
      '<span class="dim">&nbsp;~&nbsp;$</span>' +
      '<span class="cursor"></span>';
    $("tagline").textContent = c.tagline || "";
    $("footer").textContent = c.footer || "";

    // ---------- Decode / decrypt link labels ----------
    const GLYPHS = "!<>-_\\/[]{}=+*^?#@01";
    function decode(labelEl) {
      const target = labelEl.dataset.text;
      if (reduceMotion) { labelEl.textContent = target; return; }
      clearInterval(labelEl._iv);
      let frame = 0, revealed = 0;
      labelEl._iv = setInterval(() => {
        let out = "";
        for (let i = 0; i < target.length; i++) {
          out += (i < revealed) ? target[i] : GLYPHS[(Math.random() * GLYPHS.length) | 0];
        }
        labelEl.textContent = out;
        if (frame++ % 2 === 0) revealed++;
        if (revealed > target.length) { clearInterval(labelEl._iv); labelEl.textContent = target; }
      }, 40);
    }
    function resetLabel(labelEl) { clearInterval(labelEl._iv); labelEl.textContent = labelEl.dataset.text; }

    // small helper: make any tile's frosted light follow the cursor
    function trackLight(el) {
      el.addEventListener("mousemove", (e) => {
        const r = el.getBoundingClientRect();
        el.style.setProperty("--mx", (e.clientX - r.left) + "px");
        el.style.setProperty("--my", (e.clientY - r.top) + "px");
      });
    }

    // ---------- Build link tiles (inserted BEFORE the player tile) ----------
    const nav = $("links");
    const playerTile = $("player");
    c.links.forEach((link) => {
      const a = document.createElement("a");
      a.className = "tile";
      a.href = link.url;
      if (/^https?:/i.test(link.url)) { a.target = "_blank"; a.rel = "noopener noreferrer"; }
      a.innerHTML =
        '<span class="sym">' + (link.symbol || ">") + "</span>" +
        '<span class="label" data-text="' + link.label + '">' + link.label + "</span>" +
        '<span class="arrow">&#8599;</span>';
      const label = a.querySelector(".label");
      trackLight(a);
      a.addEventListener("mouseenter", () => decode(label));
      a.addEventListener("focus", () => decode(label));
      a.addEventListener("mouseleave", () => resetLabel(label));
      a.addEventListener("blur", () => resetLabel(label));
      nav.insertBefore(a, playerTile);   // keep player at the bottom of the stack
    });

    // ---------- Tab-title spinner ----------
    const frames = (c.spinnerFrames && c.spinnerFrames.length) ? c.spinnerFrames : [""];
    if (reduceMotion || frames.length < 2) {
      document.title = (frames[0] ? frames[0] + " " : "") + c.handle;
    } else {
      let fi = 0;
      const tick = () => { document.title = frames[fi] + " " + c.handle; fi = (fi + 1) % frames.length; };
      tick();
      setInterval(tick, c.spinnerSpeed || 130);
    }

    // ---------- Background YouTube video (muted + looping) ----------
    if (c.video && c.video.enabled && c.video.youtubeId) {
      const id = c.video.youtubeId;
      const params =
        "autoplay=1&mute=1&loop=1&playlist=" + id +
        "&controls=0&showinfo=0&modestbranding=1&rel=0&playsinline=1&disablekb=1&fs=0&iv_load_policy=3";
      const wrap = $("bgVideo");
      if (c.video.grayscale) wrap.classList.add("gray");
      const iframe = document.createElement("iframe");
      iframe.src = "https://www.youtube.com/embed/" + id + "?" + params;
      iframe.allow = "autoplay; encrypted-media";
      iframe.setAttribute("frameborder", "0");
      wrap.appendChild(iframe);
    }

    // ---------- Music player ----------
    const playlist = c.playlist || [];
    if (playlist.length) {
      const audio    = $("audio");
      const btnPlay  = $("playpause");
      const btnPrev  = $("prev");
      const btnNext  = $("next");
      const bar      = $("pbar");
      const progress = $("pprogress");
      const titleEl  = $("ptitle");

      playerTile.style.display = "flex";
      trackLight(playerTile);                       // player gets the light-catch too
      audio.volume = (c.startVolume != null) ? c.startVolume : 0.6;

      let index = 0;

      // load a track by index (optionally start playing)
      function load(i, play) {
        index = (i + playlist.length) % playlist.length;
        const t = playlist[index];
        audio.src = t.src;
        titleEl.innerHTML = t.title + ' <span class="partist">&mdash; ' + (t.artist || "") + "</span>";
        if (play) audio.play().catch(() => {});
      }
      // reflect state on the play button: [>] when paused, [||] when playing
      function syncBtn() { btnPlay.innerHTML = audio.paused ? "[&#9654;]" : "[&#10074;&#10074;]"; }

      // --- controls (each click is a valid user gesture, so play() works) ---
      btnPlay.addEventListener("click", (e) => {
        e.stopPropagation();
        if (audio.paused) audio.play().catch(() => {}); else audio.pause();
      });
      btnNext.addEventListener("click", (e) => { e.stopPropagation(); load(index + 1, true); });
      btnPrev.addEventListener("click", (e) => { e.stopPropagation(); load(index - 1, true); });
      audio.addEventListener("ended", () => load(index + 1, true));   // auto-advance + loop
      audio.addEventListener("play",  syncBtn);
      audio.addEventListener("pause", syncBtn);

      // progress fill + click-to-seek
      audio.addEventListener("timeupdate", () => {
        if (audio.duration) bar.style.width = (audio.currentTime / audio.duration * 100) + "%";
      });
      progress.addEventListener("click", (e) => {
        e.stopPropagation();
        const r = progress.getBoundingClientRect();
        if (audio.duration) audio.currentTime = (e.clientX - r.left) / r.width * audio.duration;
      });

      load(0, false);
      syncBtn();

      // --- autoplay with graceful fallback ---
      if (c.autoplay) {
        audio.play().then(syncBtn).catch(() => {
          // Browsers block audio until the user interacts. Start on the first
          // interaction ANYWHERE EXCEPT the player itself (so the play button's
          // own handler stays in charge and isn't double-toggled).
          const kick = (e) => {
            if (playerTile.contains(e.target)) return;   // let the buttons handle themselves
            audio.play().then(syncBtn).catch(() => {});
            window.removeEventListener("pointerdown", kick);
            window.removeEventListener("keydown", kick);
          };
          window.addEventListener("pointerdown", kick);
          window.addEventListener("keydown", kick);
        });
      }
    }
  })();
</script>
</body>
</html>
